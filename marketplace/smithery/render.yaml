services:
  - type: web
    name: frootai-mcp
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd npm-mcp && npm install
    startCommand: cd npm-mcp && node index.js http
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /healthz
