<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Dark background matching website -->
  <rect width="1200" height="630" fill="#050508"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="#ffffff" opacity="0.03"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Tree mark — centered, scaled up -->
  <g transform="translate(480, 130) scale(7.5)">
    <!-- Top canopy: Emerald -->
    <circle cx="16" cy="8" r="7.5" fill="#10b981" opacity="0.95"/>
    <!-- Left canopy: Violet -->
    <circle cx="10" cy="12" r="5.5" fill="#7c3aed" opacity="0.6"/>
    <!-- Right canopy: Cyan -->
    <circle cx="22" cy="12" r="5.5" fill="#06b6d4" opacity="0.6"/>
    <!-- Center overlap: Magenta pink -->
    <circle cx="16" cy="13" r="4" fill="#ec4899" opacity="0.5"/>
    <!-- Trunk: Pale golden -->
    <rect x="14" y="15" width="4" height="9" rx="2" fill="#f59e0b"/>
    <!-- Left root: Cyan -->
    <path d="M13.5 24 L9 28.5" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Center root: Emerald -->
    <path d="M16 25 L16 29.5" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Right root: Violet -->
    <path d="M18.5 24 L23 28.5" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- FrootAI text -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="-2">
    <tspan fill="#ffffff">Froot</tspan><tspan fill="#10b981">AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85" letter-spacing="3">
    FROM THE ROOTS TO THE FRUITS
  </text>

  <!-- Brand line -->
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#10b981" opacity="0.7" font-style="italic">
    It's simply Frootful.
  </text>

  <!-- Subtle border -->
  <rect x="2" y="2" width="1196" height="626" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1"/>
</svg>