# AI-Powered Deployment Workflow — Multi Agent Swarm
# Layer 3 — Agentic Workflow. Compiles to GitHub Actions for automated Azure deployment.

name: AI Deploy — Multi Agent Swarm
on:
  push:
    branches: [main]
    paths: ['solution-plays/22-multi-agent-swarm/infra/**']

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate Bicep
        run: az bicep build --file solution-plays/22-multi-agent-swarm/infra/main.bicep
      - name: Validate Configs
        run: |
          for f in solution-plays/22-multi-agent-swarm/config/*.json; do
            python3 -c "import json; json.load(open('$f'))"
          done

  deploy-staging:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # environment: staging  # Configure in your repo Settings > Environments
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Staging
        run: |
          az deployment group create \
            --resource-group rg-multi-agent-swarm-staging \
            --template-file solution-plays/22-multi-agent-swarm/infra/main.bicep \
            --parameters solution-plays/22-multi-agent-swarm/infra/parameters.json

  evaluate:
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install azure-ai-evaluation openai
      - name: Run Evaluation
        run: python solution-plays/22-multi-agent-swarm/evaluation/eval.py
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

  deploy-production:
    needs: evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # environment: production  # Configure in your repo Settings > Environments
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Production
        run: |
          az deployment group create \
            --resource-group rg-multi-agent-swarm \
            --template-file solution-plays/22-multi-agent-swarm/infra/main.bicep \
            --parameters solution-plays/22-multi-agent-swarm/infra/parameters.json \
            --parameters environment=prod